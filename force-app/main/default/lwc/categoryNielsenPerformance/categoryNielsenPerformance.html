<template>
    <div class="cnp-wrapper">

        <!-- ═══ Header ═══ -->
        <div class="cnp-hero">
            <lightning-icon icon-name="standard:metrics" size="small" class="cnp-hero-icon"></lightning-icon>
            <div>
                <h1 class="cnp-title">Category &amp; Nielsen Performance</h1>
                <p class="cnp-meta">Category: Salty Snacks&nbsp;&nbsp;|&nbsp;&nbsp;Market: Kroger Total US&nbsp;&nbsp;|&nbsp;&nbsp;Source: Nielsen Retail Measurement</p>
            </div>
        </div>

        <!-- ═══ KPI Tile Grid ═══ -->
        <div class="cnp-body">
            <div class="tile-grid">
                <template for:each={kpiTiles} for:item="tile">
                    <div key={tile.id} class="tile">
                        <div class="tile-value">{tile.value}</div>
                        <div class="tile-label">{tile.label}</div>
                        <div class="tile-delta">{tile.delta}</div>
                    </div>
                </template>
            </div>

            <!-- ═══ Nielsen Period Comparison Table ═══ -->
            <div class="table-section">
                <p class="table-eyebrow">NIELSEN PERIOD COMPARISON</p>
                <table class="cnp-table">
                    <thead>
                        <tr>
                            <th scope="col" class="col-metric">Metric</th>
                            <th scope="col" class="col-period">4-Wk</th>
                            <th scope="col" class="col-period">12-Wk</th>
                            <th scope="col" class="col-period col-last">52-Wk</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={tableRows} for:item="row">
                            <tr key={row.id}>
                                <td class="col-metric">{row.metric}</td>
                                <td class="col-period">{row.wk4}</td>
                                <td class="col-period">{row.wk12}</td>
                                <td class="col-period col-last">{row.wk52}</td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</template>
